# Local Postgres for USOAP tracker development.
#
# Usage:
#   docker compose up -d        # start Postgres on localhost:5432
#   docker compose down         # stop
#   docker compose down -v      # stop and wipe the volume (fresh DB)
#
# DATABASE_URL and DIRECT_URL for this instance:
#   postgresql://usoap:usoap@localhost:5432/usoap?schema=public
#
# Prod uses Vercel Postgres / Neon / Supabase. The app code does not care.

services:
  postgres:
    image: postgres:16-alpine
    container_name: usoap_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: usoap
      POSTGRES_PASSWORD: usoap
      POSTGRES_DB: usoap
    ports:
      - "5432:5432"
    volumes:
      - usoap_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U usoap -d usoap"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  usoap_pgdata:
